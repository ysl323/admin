<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录流程测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #409EFF;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover {
            background: #66b1ff;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success {
            background: #f0f9ff;
            border-left: 4px solid #67c23a;
        }
        .error {
            background: #fef0f0;
            border-left: 4px solid #f56c6c;
        }
        input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>登录流程测试 - http://47.97.185.117</h1>

    <div class="test-section">
        <h2>1. 测试健康检查</h2>
        <button onclick="testHealth()">测试 /health</button>
        <div id="health-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>2. 测试登录 API</h2>
        <div>
            <input type="text" id="username" placeholder="用户名" value="admin">
            <input type="password" id="password" placeholder="密码" value="admin123">
        </div>
        <button onclick="testLogin()">测试登录</button>
        <div id="login-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>3. 测试认证状态</h2>
        <button onclick="testAuthCheck()">检查认证状态</button>
        <div id="auth-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>4. 测试分类页面访问</h2>
        <button onclick="testCategories()">访问 /api/learning/categories</button>
        <div id="categories-result" class="result"></div>
    </div>

    <div class="test-section">
        <h2>5. 完整登录流程测试</h2>
        <button onclick="testFullFlow()">执行完整流程</button>
        <div id="flow-result" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://47.97.185.117/api';

        function displayResult(elementId, data, isError = false) {
            const element = document.getElementById(elementId);
            element.textContent = JSON.stringify(data, null, 2);
            element.className = isError ? 'result error' : 'result success';
        }

        async function testHealth() {
            try {
                const response = await fetch('http://47.97.185.117/health');
                const data = await response.json();
                displayResult('health-result', { status: response.status, data });
            } catch (error) {
                displayResult('health-result', { error: error.message }, true);
            }
        }

        async function testLogin() {
            try {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include', // 重要：包含 cookies
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                displayResult('login-result', {
                    status: response.status,
                    headers: {
                        'set-cookie': response.headers.get('set-cookie')
                    },
                    data
                }, !response.ok);
            } catch (error) {
                displayResult('login-result', { error: error.message }, true);
            }
        }

        async function testAuthCheck() {
            try {
                const response = await fetch(`${API_BASE}/auth/check`, {
                    credentials: 'include' // 重要：包含 cookies
                });

                const data = await response.json();
                displayResult('auth-result', {
                    status: response.status,
                    data
                }, !response.ok);
            } catch (error) {
                displayResult('auth-result', { error: error.message }, true);
            }
        }

        async function testCategories() {
            try {
                const response = await fetch(`${API_BASE}/learning/categories`, {
                    credentials: 'include' // 重要：包含 cookies
                });

                const data = await response.json();
                displayResult('categories-result', {
                    status: response.status,
                    data
                }, !response.ok);
            } catch (error) {
                displayResult('categories-result', { error: error.message }, true);
            }
        }

        async function testFullFlow() {
            const flowResult = document.getElementById('flow-result');
            flowResult.textContent = '开始测试...\n';
            flowResult.className = 'result';

            try {
                // 步骤 1: 登录
                flowResult.textContent += '\n步骤 1: 登录...\n';
                const loginResponse = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });

                const loginData = await loginResponse.json();
                flowResult.textContent += `登录响应: ${JSON.stringify(loginData, null, 2)}\n`;

                if (!loginResponse.ok) {
                    throw new Error('登录失败');
                }

                // 步骤 2: 检查认证状态
                flowResult.textContent += '\n步骤 2: 检查认证状态...\n';
                const authResponse = await fetch(`${API_BASE}/auth/check`, {
                    credentials: 'include'
                });

                const authData = await authResponse.json();
                flowResult.textContent += `认证状态: ${JSON.stringify(authData, null, 2)}\n`;

                // 步骤 3: 访问分类页面
                flowResult.textContent += '\n步骤 3: 访问分类页面...\n';
                const categoriesResponse = await fetch(`${API_BASE}/learning/categories`, {
                    credentials: 'include'
                });

                const categoriesData = await categoriesResponse.json();
                flowResult.textContent += `分类数据: ${JSON.stringify(categoriesData, null, 2)}\n`;

                flowResult.textContent += '\n✅ 完整流程测试成功！';
                flowResult.className = 'result success';

            } catch (error) {
                flowResult.textContent += `\n❌ 测试失败: ${error.message}`;
                flowResult.className = 'result error';
            }
        }
    </script>
</body>
</html>

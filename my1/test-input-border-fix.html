<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>输入框边框修复测试</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 40px;
        }
        
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            color: #303133;
            margin-bottom: 30px;
        }
        
        .test-section {
            margin-bottom: 40px;
        }
        
        .test-section h3 {
            color: #606266;
            margin-bottom: 15px;
        }
        
        /* 学习页面输入框样式 */
        .solid-underline-input {
            border: none;
            border-bottom: 3px solid #409eff;
            outline: none !important;
            font-size: 28px;
            text-align: center;
            padding: 10px 8px;
            background: transparent;
            color: #303133;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            min-width: 140px;
            margin: 10px;
        }

        .solid-underline-input:focus {
            border-bottom-color: #66b1ff;
            box-shadow: none !important;
            outline: none !important;
            border-top: none !important;
            border-left: none !important;
            border-right: none !important;
            -webkit-box-shadow: none !important;
            -moz-box-shadow: none !important;
        }

        .solid-underline-input:disabled {
            color: #909399;
            border-bottom-color: #dcdfe6;
            cursor: not-allowed;
        }

        .solid-underline-input.error {
            color: #f56c6c;
            border-bottom-color: #f56c6c;
        }
        
        /* 全局输入框样式重置 */
        input:focus,
        textarea:focus,
        select:focus {
            outline: none !important;
            box-shadow: none !important;
            -webkit-box-shadow: none !important;
            -moz-box-shadow: none !important;
        }

        .solid-underline-input,
        .solid-underline-input:focus,
        .solid-underline-input:active,
        .solid-underline-input:hover {
            outline: none !important;
            box-shadow: none !important;
            -webkit-box-shadow: none !important;
            -moz-box-shadow: none !important;
            border-top: none !important;
            border-left: none !important;
            border-right: none !important;
        }
        
        .multi-word-input {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .instructions {
            background: #f0f9ff;
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid #409eff;
            margin-bottom: 20px;
        }
        
        .instructions h4 {
            color: #409eff;
            margin-bottom: 10px;
        }
        
        .instructions p {
            color: #606266;
            line-height: 1.6;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>输入框边框修复测试</h1>
        
        <div class="instructions">
            <h4>测试说明：</h4>
            <p>1. 点击下面的输入框，检查是否还有半透明边框</p>
            <p>2. 应该只看到蓝色的下划线，没有任何其他边框或阴影</p>
            <p>3. 如果还能看到半透明边框，请截图反馈</p>
        </div>
        
        <div class="test-section">
            <h3>单个单词输入框测试：</h3>
            <div style="text-align: center;">
                <input type="text" class="solid-underline-input" placeholder="点击输入单词" />
            </div>
        </div>
        
        <div class="test-section">
            <h3>多单词输入框测试：</h3>
            <div class="multi-word-input">
                <input type="text" class="solid-underline-input" placeholder="第一个" style="width: 120px;" />
                <input type="text" class="solid-underline-input" placeholder="第二个" style="width: 120px;" />
                <input type="text" class="solid-underline-input" placeholder="第三个" style="width: 120px;" />
            </div>
        </div>
        
        <div class="test-section">
            <h3>错误状态输入框测试：</h3>
            <div style="text-align: center;">
                <input type="text" class="solid-underline-input error" value="错误示例" />
            </div>
        </div>
        
        <div class="test-section">
            <h3>禁用状态输入框测试：</h3>
            <div style="text-align: center;">
                <input type="text" class="solid-underline-input" value="禁用状态" disabled />
            </div>
        </div>
    </div>

    <script>
        // 添加一些交互测试
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('.solid-underline-input');
            
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    console.log('输入框获得焦点，检查是否有半透明边框');
                });
                
                input.addEventListener('blur', function() {
                    console.log('输入框失去焦点');
                });
            });
        });
    </script>
</body>
</html>

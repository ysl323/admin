<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证码测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .success { color: green; }
        .error { color: red; }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>验证码功能测试</h1>
    
    <div class="test-section">
        <h2>测试1: 直接访问后端API</h2>
        <button onclick="testBackendDirect()">测试后端 (localhost:3000)</button>
        <div id="backend-result"></div>
    </div>

    <div class="test-section">
        <h2>测试2: 通过前端代理访问</h2>
        <button onclick="testFrontendProxy()">测试代理 (localhost:5173)</button>
        <div id="proxy-result"></div>
    </div>

    <div class="test-section">
        <h2>测试3: 模拟注册页面请求</h2>
        <button onclick="testRegisterPage()">模拟注册页面</button>
        <div id="register-result"></div>
    </div>

    <div id="result"></div>

    <script>
        async function testBackendDirect() {
            const resultDiv = document.getElementById('backend-result');
            resultDiv.innerHTML = '测试中...';
            
            try {
                const response = await fetch('http://localhost:3000/api/captcha');
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `<span class="success">✅ 成功!</span><br>
                        验证码ID: ${data.captchaId}<br>
                        问题: ${data.question}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ 失败: ${data.message}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 错误: ${error.message}</span>`;
            }
        }

        async function testFrontendProxy() {
            const resultDiv = document.getElementById('proxy-result');
            resultDiv.innerHTML = '测试中...';
            
            try {
                const response = await fetch('http://localhost:5173/api/captcha');
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `<span class="success">✅ 成功!</span><br>
                        验证码ID: ${data.captchaId}<br>
                        问题: ${data.question}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ 失败: ${data.message}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 错误: ${error.message}</span>`;
            }
        }

        async function testRegisterPage() {
            const resultDiv = document.getElementById('register-result');
            resultDiv.innerHTML = '测试中...';
            
            try {
                // 模拟注册页面的请求方式
                const response = await fetch('/api/captcha', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `<span class="success">✅ 成功!</span><br>
                        验证码ID: ${data.captchaId}<br>
                        问题: ${data.question}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">❌ 失败: ${data.message}</span>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">❌ 错误: ${error.message}</span>`;
            }
        }

        // 页面加载时自动运行所有测试
        window.onload = function() {
            console.log('页面加载完成，开始测试...');
            setTimeout(() => {
                testBackendDirect();
                setTimeout(() => testFrontendProxy(), 1000);
                setTimeout(() => testRegisterPage(), 2000);
            }, 500);
        };
    </script>
</body>
</html>
